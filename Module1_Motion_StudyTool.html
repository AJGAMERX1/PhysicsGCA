<body>
<div class="hdr"><div class="hdr-in">
<div><div class="hdr-lab">Module 1 · Physics Study Tool</div><h1 class="hdr-t"><i>Motion</i> in One Dimension</h1></div>
<div class="hdr-r"><div class="stats">
<div class="stat-box"><div class="stat-n" id="sC">0</div><div class="stat-l">Correct</div></div>
<div class="stat-box"><div class="stat-n" id="sA">0</div><div class="stat-l">Attempted</div></div>
<div class="stat-box"><div class="stat-n pct-n" id="sP">—</div><div class="stat-l">Accuracy</div></div>
<div class="stat-box"><div class="stat-n streak-n" id="sS"><span id="fire">🔥</span> 0</div><div class="stat-l">Streak</div></div>
</div><button class="btn-r" onclick="resetStats()">Reset</button></div>
</div></div>
<div id="modeBar" class="modes"></div>
<div id="ctrlBar" class="toolbar"></div>
<div class="cnt" id="main"></div>
<script>
function R(a,b,d){d=d||0;const f=Math.pow(10,d);return Math.round((Math.random()*(b-a)+a)*f)/f}
function rd(v,d){return Math.round(v*Math.pow(10,d))/Math.pow(10,d)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function sigFig(v,n){if(v===0)return 0;const d=Math.ceil(Math.log10(Math.abs(v)));const p=n-d;return rd(v,p)}

// ========== VOCAB (from Module 1) ==========
const VOCAB=[
{t:"displacement",d:"the change in an object's position; a vector quantity that includes direction"},
{t:"distance",d:"the total path length traveled by an object; a scalar quantity with no direction"},
{t:"vector quantity",d:"a physical measurement that contains directional information (e.g. displacement, velocity, acceleration)"},
{t:"scalar quantity",d:"a physical measurement that does not contain directional information (e.g. distance, speed, time)"},
{t:"velocity",d:"the time rate of change of an object's position; v = Δx/Δt; a vector quantity (m/s)"},
{t:"speed",d:"the time rate of change of the distance traveled by an object; speed = Δd/Δt; a scalar quantity (m/s)"},
{t:"instantaneous velocity",d:"the velocity of an object at one moment in time"},
{t:"average velocity",d:"the velocity of an object over an extended period of time, calculated as total displacement divided by total time"},
{t:"acceleration",d:"the time rate of change of an object's velocity; a = Δv/Δt; a vector quantity (m/s²)"},
{t:"position",d:"where an object is located; the answer to 'where is the object?'"},
{t:"slope of position vs time",d:"represents the velocity of the object; rise over run gives Δx/Δt = v"},
{t:"slope of velocity vs time",d:"represents the acceleration of the object; rise over run gives Δv/Δt = a"},
{t:"area under velocity vs time",d:"represents the displacement of the object"},
{t:"relative velocity",d:"velocity depends on the observer; calculated as v(observed) − v(observer)"},
{t:"positive vs negative direction",d:"a mathematical convention used to denote direction in one-dimensional motion; the choice is arbitrary but must stay consistent"},
{t:"frame of reference",d:"the observer or coordinate system from which motion is measured; motion is relative to it"}
];

// ========== SECTIONS ==========
const SEC=[
{id:"distdisp",title:"Distance & Displacement",icon:"📏",types:[{id:"dd_basic",name:"Find distance & displacement"},{id:"dd_threeleg",name:"Three-leg trip"}]},
{id:"velocity",title:"Speed & Velocity",icon:"🏃",types:[{id:"v_velocity",name:"Find velocity"},{id:"v_speed",name:"Find avg speed (round trip)"},{id:"v_distance",name:"Find distance (v·t)"},{id:"v_time",name:"Find time (Δx/v)"},{id:"v_convert",name:"Unit conversion + velocity"}]},
{id:"accel",title:"Acceleration",icon:"⚡",types:[{id:"a_basic",name:"Find acceleration"},{id:"a_vinitial",name:"Find initial velocity"},{id:"a_vfinal",name:"Find final velocity"},{id:"a_time",name:"Find time"},{id:"a_speedup",name:"Speeding up or slowing down?"}]},
{id:"relative",title:"Relative Velocity",icon:"🚗",types:[{id:"rv_observer",name:"Observed velocity"},{id:"rv_approaching",name:"Two objects approaching"}]},
{id:"graphs",title:"Graph Interpretation",icon:"📈",types:[{id:"g_pt_slope",name:"Velocity from P-vs-T"},{id:"g_vt_slope",name:"Accel from V-vs-T"},{id:"g_pt_direction",name:"Direction changes (P-vs-T)"},{id:"g_speedup",name:"Speeding up on V-vs-T"}]},
{id:"concept",title:"Concept Questions",icon:"🧠",types:[{id:"c_vector_scalar",name:"Vector vs Scalar"},{id:"c_signs",name:"Sign Interpretation"},{id:"c_speedup_dir",name:"Speeding up/slowing down"},{id:"c_velocity_zero",name:"Velocity & Acceleration zero?"}]}
];

// ========== GENERATORS ==========
const G={
// --- DISTANCE & DISPLACEMENT (Example 1.1) ---
dd_basic(){
  const scenarios=[
    {a:"An ant",unit:"cm",d1:R(8,20,1),d2:R(2,7,1),loc1:"a crust of bread",loc2:"back toward its anthill"},
    {a:"A child",unit:"m",d1:R(4.0,9.0,1),d2:R(1.5,3.5,1),loc1:"a wall",loc2:"back after bouncing"},
    {a:"A dog",unit:"m",d1:R(6.0,15.0,1),d2:R(2.0,5.0,1),loc1:"a tennis ball",loc2:"part of the way back"},
    {a:"A skateboarder",unit:"m",d1:R(10.0,25.0,1),d2:R(4.0,10.0,1),loc1:"a ramp",loc2:"partway back"}
  ];
  const s=pick(scenarios);
  const totalDist=rd(s.d1+s.d2,1);
  const disp=rd(s.d1-s.d2,1);
  return{ref:"Ex 1.1",q:`${s.a} starts at its starting point and travels <b>${s.d1} ${s.unit}</b> toward ${s.loc1}. It then turns around and travels <b>${s.d2} ${s.unit}</b> ${s.loc2}. What is the <b>total displacement</b>?`,gv:`Leg 1: +${s.d1} ${s.unit}\nLeg 2: −${s.d2} ${s.unit}\n(define motion toward ${s.loc1} as +)`,fm:`Total distance = |d₁| + |d₂|\nDisplacement = d₁ + d₂ (with signs)`,fi:`Displacement = ? ${s.unit}`,u:s.unit,a:disp,tol:Math.max(Math.abs(disp)*0.01,0.05),

// --- ACCELERATION (Example 1.6) ---
a_basic(){
  // Could be speeding up from rest, OR slowing to stop, OR speed change
  const scenarios=[
    ()=>{
      const vf=R(8,30,1),t=R(2.0,6.0,1);
      const a=rd(vf/t,2);
      const sub=pick(["A sprinter","A cheetah","A motorcycle","A car"]);
      return{q:`${sub} starts from rest and, in <b>${t} seconds</b>, is traveling with a velocity of <b>${vf} m/s east</b>. What is the acceleration?`,gv:`v_initial = 0 m/s\nv_final = ${vf} m/s east\nΔt = ${t} s`,a:a,
      st:[`<span class='lb'>Δv</span> ${vf} − 0 = ${vf} m/s`,`<span class='lb'>FORMULA</span> a = Δv / Δt`,`<span class='lb'>SOLVE</span> a = ${vf} / ${t}`,`<span class='lb'>ANSWER</span> <span class='ans'>a = ${a} m/s² east</span>`],
      nt:`From rest means v_initial = 0 (treat as exact — infinite sig figs).`}
    },
    ()=>{
      const v=R(15,30,1),t=R(1.8,4.0,1);
      const a=rd(-v/t,1);
      const sub=pick(["A car","A truck","A bicycle"]);
      return{q:`${sub} is moving with a velocity of <b>${v} m/s east</b>. The driver slams on the brakes and the vehicle comes to a halt in <b>${t} seconds</b>. What is the acceleration?`,gv:`v_initial = ${v} m/s east\nv_final = 0 m/s\nΔt = ${t} s`,a:a,
      st:[`<span class='lb'>Δv</span> 0 − ${v} = −${v} m/s`,`<span class='lb'>FORMULA</span> a = Δv / Δt`,`<span class='lb'>SOLVE</span> a = −${v} / ${t}`,`<span class='lb'>ANSWER</span> <span class='ans'>a = ${a} m/s² (negative = west, slowing down)</span>`],
      nt:`Negative acceleration ≠ slowing down automatically! Here velocity is positive but acceleration is negative → slowing down. Opposite signs.`}
    },
    ()=>{
      const v1=R(5,15,1),v2=R(18,35,1),t=R(2.0,8.0,1);
      const a=rd((v2-v1)/t,2);
      return{q:`A motorcycle accelerates from <b>${v1} m/s</b> to <b>${v2} m/s</b> in <b>${t} seconds</b>. What is the acceleration?`,gv:`v_initial = ${v1} m/s\nv_final = ${v2} m/s\nΔt = ${t} s`,a:a,
      st:[`<span class='lb'>Δv</span> ${v2} − ${v1} = ${rd(v2-v1,1)} m/s`,`<span class='lb'>FORMULA</span> a = Δv / Δt`,`<span class='lb'>SOLVE</span> a = ${rd(v2-v1,1)} / ${t}`,`<span class='lb'>ANSWER</span> <span class='ans'>a = ${a} m/s²</span>`],
      nt:`Δv = v_final − v_initial. Always subtract initial FROM final.`}
    }
  ];
  const s=pick(scenarios)();
  return{ref:"Ex 1.6",q:s.q,gv:s.gv,fm:`a = Δv / Δt\nΔv = v_final − v_initial`,fi:`a = ? m/s²`,u:"m/s²",a:s.a,tol:Math.max(Math.abs(s.a)*0.03,0.05),st:s.st,nt:s.nt}
},

a_time(){

a_speedup(){

  st:[`<span class='lb'>SIGN OF v</span> ${v>0?"positive":"negative"}`,`<span class='lb'>SIGN OF a</span> ${a>0?"positive":"negative"}`,`<span class='lb'>SIGNS ARE</span> ${sameSign?"the SAME → speeding up":"OPPOSITE → slowing down"}`,`<span class='lb'>ANSWER</span> <span class='ans'>${correct} (${ans})</span>`],nt:`Acceleration just means velocity is changing. SAME signs = velocity getting more extreme = speeding up. OPPOSITE signs = velocity decreasing toward zero = slowing down.`}
},
// --- RELATIVE VELOCITY (Example 1.5) ---
rv_observer(){

  const vBoat=R(8,20,0),vRaft=R(2,6,0);

    const ans=rd(-vRaft-vBoat,1);

    st:[`<span class='lb'>FORMULA</span> v_observed = v_object − v_observer`,`<span class='lb'>SOLVE</span> v(raft from boat) = (−${vRaft}) − (+${vBoat})`,`<span class='lb'>CALC</span> v = ${ans} m/s`,`<span class='lb'>ANSWER</span> <span class='ans'>${ans} m/s (= ${Math.abs(ans)} m/s DOWN the river)</span>`],nt:`Always do v_object minus v_observer. The negative answer means down the river.`}
  } else {
    const ans=rd(vBoat-(-vRaft),1);
    return{ref:"Ex 1.5 / OYO 1.7",q:`A fisherman on shore sees a boat traveling at <b>${vBoat} m/s up the river</b> and a raft floating <b>${vRaft} m/s down the river</b>. (Define up the river = positive.) What is the velocity of the <b>boat as observed by the boy on the raft</b>?`,gv:`v_boat = +${vBoat} m/s\nv_raft = −${vRaft} m/s\n(observer = raft)`,fm:`v_observed = v_object − v_observer`,fi:`v(boat from raft) = ? m/s`,u:"m/s",a:ans,tol:Math.max(Math.abs(ans)*0.02,0.5),
    st:[`<span class='lb'>FORMULA</span> v_observed = v_object − v_observer`,`<span class='lb'>SOLVE</span> v(boat from raft) = (+${vBoat}) − (−${vRaft})`,`<span class='lb'>CALC</span> v = ${vBoat} + ${vRaft} = ${ans} m/s`,`<span class='lb'>ANSWER</span> <span class='ans'>+${ans} m/s (UP the river)</span>`],nt:`Subtracting a negative is adding. To the raft, the boat looks faster than to a stationary observer!`}
  }

  st:[`<span class='lb'>RISE (Δv)</span> ${v2} − ${v1} = ${rd(v2-v1,1)} m/s`,`<span class='lb'>RUN (Δt)</span> ${t2} − ${t1} = ${t2-t1} s`,`<span class='lb'>SLOPE</span> a = ${rd(v2-v1,1)} / ${t2-t1}`,`<span class='lb'>ANSWER</span> <span class='ans'>a = ${a} m/s²</span>`],nt:`The slope of a velocity-vs-time graph IS the acceleration. (Just like position-vs-time gives velocity!)`}

    {desc:"An object is at rest but is about to start moving. Is acceleration 0 at this exact instant?",ans:0,why:"NO — for the object to start moving, velocity must be changing, which means a ≠ 0."}

  st:[`<span class='lb'>KEY FACT</span> If velocity is zero, acceleration does NOT have to be zero`,`<span class='lb'>WHY</span> ${c.why}`,`<span class='lb'>ANSWER</span> <span class='ans'>${c.ans===1?"Yes (1)":"No (0)"}</span>`],nt:`Velocity = 0 just tells you where you are NOW. Acceleration tells you how velocity is CHANGING. Independent concepts!`}
}

{type:"checkpoint",q:"A sprinter starts from rest and reaches a velocity of 16 m/s east in 3.4 seconds. What is her acceleration?",opts:[{t:"4.7 m/s² east",ok:true},{t:"19.4 m/s² east",ok:false},{t:"0.21 m/s² east",ok:false},{t:"4.7 m/s east",ok:false}],hint:"a = Δv/Δt = (16 − 0)/3.4 = ?",expl:"Δv = 16 − 0 = 16 m/s. a = 16/3.4 = 4.7 m/s² east. Note the UNITS: m/s² not m/s. The 'east' shows it's a vector."},
{type:"teach",title:"The Sign Rule: Speeding Up vs Slowing Down",body:"Here's the most common physics trap: <b>'negative acceleration' does NOT automatically mean slowing down</b>.<br><br>The key is comparing the SIGN of velocity and acceleration:<br><br>✅ <b>Same signs</b> (both + or both −) → speeding up<br>❌ <b>Opposite signs</b> → slowing down<br><br><b>Example 1</b>: v = +20 m/s, a = +3 m/s² → both positive → SPEEDING UP ✓<br><b>Example 2</b>: v = +20 m/s, a = −3 m/s² → opposite → SLOWING DOWN ✓<br><b>Example 3</b>: v = −20 m/s, a = −3 m/s² → both negative → SPEEDING UP (going faster in − direction) ✓<br><b>Example 4</b>: v = −20 m/s, a = +3 m/s² → opposite → SLOWING DOWN ✓"},
{type:"checkpoint",q:"A car has velocity −12.6 m/s and acceleration +1.4 m/s². Is it speeding up or slowing down?",opts:[{t:"Slowing down",ok:true},{t:"Speeding up",ok:false},{t:"Going at constant speed",ok:false},{t:"Cannot tell without more info",ok:false}],hint:"Compare the signs: one is negative (velocity), one is positive (acceleration). What does that tell you?",expl:"Velocity is negative, acceleration is positive → OPPOSITE signs → SLOWING DOWN. The car is moving in the negative direction but accelerating toward positive, which is decelerating it."},
{type:"teach",title:"Free Fall: 9.8 m/s²",body:"On Earth, every object near the surface accelerates downward at <b>9.8 m/s²</b> due to gravity (assuming no air resistance).<br><br>Drop a ball: in 1 second, it's going 9.8 m/s. In 2 seconds, 19.6 m/s. In 3 seconds, 29.4 m/s.<br><br>It speeds up by 9.8 m/s every second!<br><br>11 m/s ≈ 25 mph, so things fall <em>fast</em>."},
{type:"checkpoint",q:"A ball is thrown straight up. At the very top of its path, the ball's velocity is momentarily 0. What is its acceleration at that instant?",opts:[{t:"9.8 m/s² downward",ok:true},{t:"0 m/s²",ok:false},{t:"9.8 m/s² upward",ok:false},{t:"Cannot tell without more info",ok:false}],hint:"Gravity doesn't take a break when v = 0! What's pulling on the ball at the peak?",expl:"Gravity ALWAYS pulls down at 9.8 m/s² near Earth. At the peak, v = 0 only for an instant — but a is still 9.8 m/s² down. This is why the ball falls back down!<br><br>RULE: If v = 0, a does NOT have to be 0."}
],
quiz:[
{q:"Acceleration is defined as:",opts:[{t:"Change in velocity divided by change in time",ok:true},{t:"Velocity times time",ok:false},{t:"Speed squared",ok:false},{t:"Always positive",ok:false}]},
{q:"A car accelerates at 3 m/s² for 4 seconds. By how much does its velocity change?",opts:[{t:"12 m/s",ok:true},{t:"0.75 m/s",ok:false},{t:"7 m/s",ok:false},{t:"−1 m/s",ok:false}],expl:"Δv = a × Δt = 3 × 4 = 12 m/s"},
{q:"If velocity = +15 m/s and acceleration = −2 m/s², the object is:",opts:[{t:"Slowing down",ok:true},{t:"Speeding up",ok:false},{t:"Going in the negative direction",ok:false},{t:"At rest",ok:false}],expl:"Opposite signs (+ and −) → slowing down."},
{q:"If velocity = −8 m/s and acceleration = −3 m/s², the object is:",opts:[{t:"Speeding up (in the negative direction)",ok:true},{t:"Slowing down",ok:false},{t:"Going forward",ok:false},{t:"Stopped",ok:false}],expl:"Same signs (both negative) → speeding up. The object is moving in the negative direction AND accelerating in the negative direction → faster in the negative direction."},
{q:"A ball is thrown up. At the top of its arc, v = 0. The acceleration is:",opts:[{t:"9.8 m/s² downward (gravity)",ok:true},{t:"0 m/s²",ok:false},{t:"9.8 m/s² upward",ok:false},{t:"Depends on how high",ok:false}],expl:"Gravity acts continuously. v=0 at top is momentary, but a is constant at 9.8 m/s² down throughout the entire flight."}
]},
graphs:{title:"Position & Velocity Graphs",icon:"📈",
cards:[
{type:"teach",title:"Position-vs-Time Graphs",body:"On a <b>position-vs-time graph</b>, the y-axis shows position and the x-axis shows time. The curve traces how the object's location changes over time.<br><br><b>The single most important fact:</b><br><br>📐 <b>The slope of a position-vs-time curve = velocity!</b><br><br>That's because slope = rise/run = Δx/Δt = v.<br><br>So just by looking at how the graph rises and falls, you can read off the velocity."},
{type:"equation",title:"Slope = Velocity",eq:"slope = rise / run<br>= Δx / Δt<br>= v",note:"Steep curve → fast. Flat curve → stopped. Negative slope → moving backward."},
{type:"checkpoint",q:"On a position-vs-time graph, at t = 1.0 s the position is 1.0 m, and at t = 6.0 s the position is 8.0 m. The average velocity during this interval is:",opts:[{t:"1.4 m/s",ok:true},{t:"7.0 m/s",ok:false},{t:"5.0 m/s",ok:false},{t:"0.71 m/s",ok:false}],hint:"slope = rise/run = (8.0 − 1.0)/(6.0 − 1.0)",expl:"slope = (8.0 − 1.0)/(6.0 − 1.0) = 7.0/5.0 = 1.4 m/s. Always rise OVER run, not the other way!"},
{type:"teach",title:"Reading Direction Changes",body:"When does an object change direction? <b>Whenever the slope of P-vs-T changes sign.</b><br><br>If a curve rises, then falls, then rises again, the object changed direction TWICE.<br><br>If the curve is flat for a moment, the velocity is 0 at that instant (object stopped briefly)."},
{type:"checkpoint",q:"A position-vs-time curve starts by rising, then becomes flat, then falls. How many times does the object change direction?",opts:[{t:"1 time",ok:true},{t:"2 times",ok:false},{t:"0 times",ok:false},{t:"3 times",ok:false}],hint:"Flat means v=0 momentarily, but that's only a direction change if slope goes from + to −",expl:"The slope went from positive → zero → negative. The sign flipped from + to − once. That's ONE direction change. (The flat part is just where it briefly paused before reversing.)"},
{type:"teach",title:"Velocity-vs-Time Graphs",body:"Same idea, different graph. On a <b>velocity-vs-time graph</b>:<br><br>📐 <b>Slope = acceleration!</b><br><br>(Because slope = Δv/Δt = a.)<br><br>Plus a bonus: <b>area under the curve = displacement</b>. (That's calculus material — comes back in a future module.)<br><br><b>Speeding up?</b> Slope and velocity have the SAME sign.<br><b>Slowing down?</b> Slope and velocity have OPPOSITE signs."},
{type:"checkpoint",q:"On a velocity-vs-time graph, the velocity at t = 1.0 s is 0 m/s and at t = 4.0 s the velocity is 3.0 m/s (the curve is a straight line between these points). What is the acceleration?",opts:[{t:"1.0 m/s²",ok:true},{t:"3.0 m/s²",ok:false},{t:"0.33 m/s²",ok:false},{t:"4.0 m/s²",ok:false}],hint:"a = Δv/Δt = (3.0−0)/(4.0−1.0)",expl:"a = (3.0 − 0)/(4.0 − 1.0) = 3.0/3.0 = 1.0 m/s². Slope of v-vs-t IS the acceleration."}
],

{q:"On a position-vs-time graph, the slope represents:",opts:[{t:"Velocity",ok:true},{t:"Acceleration",ok:false},{t:"Distance",ok:false},{t:"Time",ok:false}]},
{q:"On a velocity-vs-time graph, the slope represents:",opts:[{t:"Acceleration",ok:true},{t:"Velocity",ok:false},{t:"Displacement",ok:false},{t:"Speed",ok:false}]},
{q:"A position-vs-time curve is FLAT for a few seconds. This means the object:",opts:[{t:"Is stopped (velocity = 0)",ok:true},{t:"Is moving fast",ok:false},{t:"Is accelerating",ok:false},{t:"Has reversed direction",ok:false}],expl:"Flat = zero slope = zero velocity. Object is at rest for that interval."},
{q:"On a velocity-vs-time graph, the curve is flat (slope = 0). This means:",opts:[{t:"Acceleration is 0 (constant velocity)",ok:true},{t:"Velocity is 0 (at rest)",ok:false},{t:"Object is stopped",ok:false},{t:"There's no motion",ok:false}],expl:"Slope of v-vs-t = acceleration. Flat slope = a = 0 = constant velocity. The object may still be moving — just not changing velocity."},
{q:"On a position-vs-time curve, when does the object change direction?",opts:[{t:"When the slope changes sign",ok:true},{t:"When the curve is steep",ok:false},{t:"When the position is zero",ok:false},{t:"Never",ok:false}],expl:"Slope sign change = velocity sign change = direction change."}
]}

let mode="problems",active="distdisp",subType=null,prob=null,answered=false,solShown=false,userVal="";
let nC=0,nA=0,streak=0;
let hide={given:false,formula:false,find:false};
let vMode="mc",vQ=null,vAns=false,vUA=null;
let lTopic=null,lIdx=0,lCPA=false,lCPU=null,lCPH=false;
let qzMode=false,qzIdx=0,qzA=false,qzU=null,qzS=0;

function updS(){document.getElementById("sC").textContent=nC;document.getElementById("sA").textContent=nA;document.getElementById("sP").textContent=nA>0?rd(nC/nA*100,0)+"%":"—";document.getElementById("sS").innerHTML='<span id="fire">🔥</span> '+streak}
function resetStats(){nC=0;nA=0;streak=0;updS();if(mode==="problems")genP();else if(mode==="vocab")genV();else if(mode==="learn"){lTopic=null;renderL()}else renderCS()}
function syncToggles(){["given","formula","find"].forEach(function(k){var b=document.getElementById("tg-"+k);if(!b)return;if(hide[k])b.classList.add("on");else b.classList.remove("on")});var a=document.getElementById("tg-all");if(a){if(hide.given&&hide.formula&&hide.find)a.classList.add("on");else a.classList.remove("on")}}
function tglH(k){hide[k]=!hide[k];syncToggles();renderProb()}
function tglAll(){var a=hide.given&&hide.formula&&hide.find;hide.given=hide.formula=hide.find=!a;syncToggles();renderProb()}
function renderModes(){document.getElementById("modeBar").innerHTML=[{id:"problems",l:"⚡ Problems"},{id:"learn",l:"🎓 Learn"},{id:"vocab",l:"📖 Vocab"},{id:"cheatsheet",l:"📋 Cheatsheet"}].map(m=>`<button class="mode-btn${mode===m.id?" on":""}" onclick="switchMode('${m.id}')">${m.l}</button>`).join("")}
function switchMode(m){mode=m;renderModes();renderCtrls();if(m==="problems")genP();else if(m==="vocab")genV();else if(m==="learn"){lTopic=null;renderL()}else renderCS()}
function renderCtrls(){
  const el=document.getElementById("ctrlBar");
  if(mode==="problems"){
    let h=SEC.map(s=>`<button class="cb${active===s.id?" on":""}" onclick="active='${s.id}';subType=null;genP()">${s.icon} ${s.title}</button>`).join("");
    h+=`<span style="width:6px;display:inline-block"></span><span class="cl">Hide:</span>`;
    h+=`<button class="tg" id="tg-given" onclick="tglH('given')"><span class="tg-dot"></span>Givens</button>`;
    h+=`<button class="tg" id="tg-formula" onclick="tglH('formula')"><span class="tg-dot"></span>Formulas</button>`;
    h+=`<button class="tg" id="tg-find" onclick="tglH('find')"><span class="tg-dot"></span>Solve-For</button>`;
    h+=`<button class="tg" id="tg-all" onclick="tglAll()"><span class="tg-dot"></span>Exam</button>`;
    el.innerHTML=h;syncToggles();
  } else if(mode==="vocab")el.innerHTML=`<span class="cl">Format:</span><button class="cb${vMode==="mc"?" on":""}" onclick="vMode='mc';genV()">MC</button><button class="cb${vMode==="written"?" on":""}" onclick="vMode='written';genV()">Written</button><button class="cb${vMode==="tf"?" on":""}" onclick="vMode='tf';genV()">T/F</button>`;
  else if(mode==="learn")el.innerHTML=`<span class="cl">Guided lessons with checkpoints and end-of-lesson quiz</span>`;
  else el.innerHTML=`<span class="cl">All Module 1 formulas, worked examples, and vocab</span>`;
}

// ========== PROBLEMS ==========
function genP(){const sec=SEC.find(s=>s.id===active),tid=subType||pick(sec.types).id;prob=G[tid]();answered=false;solShown=false;userVal="";renderCtrls();renderProb()}
function chkP(){if(answered)return;const inp=document.getElementById("inp");if(!inp)return;const raw=inp.value.trim();if(!raw)return;const v=parseFloat(raw.replace(/,/g,""));if(isNaN(v)){inp.classList.add("v-no");setTimeout(()=>{const e=document.getElementById("inp");if(e)e.classList.remove("v-no")},400);return}userVal=raw;answered=true;nA++;if(Math.abs(v-prob.a)<=prob.tol){nC++;streak++}else streak=0;updS();renderProb()}
function showPS(){userVal=document.getElementById("inp")?document.getElementById("inp").value:"";solShown=true;if(!answered){answered=true;nA++;streak=0;updS()}renderProb()}
function renderProb(){const el=document.getElementById("main"),p=prob;if(!p){el.innerHTML="";return}let isOk=false;if(answered){const v=parseFloat(String(userVal).replace(/,/g,""));isOk=!isNaN(v)&&Math.abs(v-p.a)<=p.tol}const cc=answered?(isOk?"ok":"no"):"",bc=answered?(isOk?"bg-ok":"bg-no"):"bg-q",sec=SEC.find(s=>s.id===active);const hc=(hide.given?1:0)+(hide.formula?1:0)+(hide.find?1:0),dl=hc===3?"EXAM MODE":hc>=2?"HARD+":hc===1?"HARD":"";let h=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"><button class="cb${!subType?" on":""}" onclick="subType=null;genP()">Random</button>`;sec.types.forEach(t=>{h+=`<button class="cb${subType===t.id?" on":""}" onclick="subType='${t.id}';genP()">${t.name}</button>`});h+=`</div>`;h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${bc}">${answered?(isOk?"✓ Correct":"✗ Incorrect"):"Problem"}</span><span class="bg bg-ty">${p.ref}</span>${dl?`<span class="bg bg-hard">${dl}</span>`:""}</div><div class="q-txt">${p.q}</div>`;const gH=hide.given&&!answered&&!solShown,fH=hide.formula&&!answered&&!solShown,wH=hide.find&&!answered&&!solShown;if(p.gv&&(!gH||!fH||!wH)){h+=`<div class="ir">`;if(!gH)h+=`<div class="ib ib-g"><span class="ib-l">Given</span>${p.gv.replace(/\n/g,"<br>")}</div>`;if(p.fm&&!fH)h+=`<div class="ib ib-f"><span class="ib-l">Formula</span>${p.fm.replace(/\n/g,"<br>")}</div>`;if(p.fi&&!wH)h+=`<div class="ib ib-w"><span class="ib-l">Solve For</span>${p.fi.replace(/\n/g,"<br>")}</div>`;h+=`</div>`}if(!answered)h+=`<div class="aa"><div class="aw"><input class="ai" id="inp" type="text" inputmode="decimal" placeholder="Type answer…" value="${userVal}" onkeydown="if(event.key==='Enter')chkP()"><span class="au">${p.u}</span></div><button class="ab" onclick="chkP()">Check</button></div><div class="btn-row"><button class="btn-sh" onclick="showPS()">Show Solution</button></div>`;else{h+=`<div class="aa"><div class="aw"><input class="ai ${isOk?"v-ok":"v-no"}" value="${userVal}" disabled><span class="au">${p.u}</span></div></div><div class="fb ${isOk?"fb-ok":"fb-no"}">${isOk?`✓ Correct! Streak: ${streak} 🔥`:"✗ Not quite"}</div>`;if(!isOk)h+=`<div class="fb-v">Answer: ${p.a} ${p.u}</div>`}if(answered||solShown){h+=`<div class="sol"><div class="sol-tag">Solution</div>`;p.st.forEach(s=>{h+=`<div class="stp">${s}</div>`});h+=`<div class="sol-note">${p.nt}</div></div>`}if(answered)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genP()">Next →</button></div>`;h+=`</div>`;el.innerHTML=h;if(!answered){const i=document.getElementById("inp");if(i)setTimeout(()=>i.focus(),50)}}

// ========== VOCAB ==========
function genV(){vAns=false;vUA=null;if(vMode==="mc")genVMC();else if(vMode==="tf")genVTF();else genVW();renderCtrls();renderVocab()}
function genVMC(){const c=pick(VOCAB),wr=shuffle(VOCAB.filter(v=>v.t!==c.t)).slice(0,3),askT=Math.random()<0.5,opts=shuffle([c,...wr]);vQ={type:"mc",c,opts,askT,ci:opts.indexOf(c)}}
function genVTF(){const c=pick(VOCAB),isT=Math.random()<0.5;vQ={type:"tf",t:c.t,sd:isT?c.d:pick(VOCAB.filter(v=>v.t!==c.t)).d,isT,cd:c.d}}
function genVW(){vQ={type:"written",c:pick(VOCAB),askT:Math.random()<0.5}}
function chkVM(i){if(vAns)return;vAns=true;vUA=i;nA++;if(i===vQ.ci){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVT(a){if(vAns)return;vAns=true;vUA=a;nA++;if(a===vQ.isT){nC++;streak++}else streak=0;updS();renderVocab()}
function chkVW(){if(vAns)return;const inp=document.getElementById("vi");if(!inp||!inp.value.trim())return;vAns=true;const u=inp.value.trim().toLowerCase(),tgt=vQ.askT?vQ.c.d.toLowerCase():vQ.c.t.toLowerCase(),tw=tgt.split(/\s+/).filter(w=>w.length>3),mc=tw.filter(w=>u.includes(w)).length;vUA=tw.length>0&&(mc/tw.length>=0.4);nA++;if(vUA){nC++;streak++}else streak=0;updS();renderVocab()}
function renderVocab(){const el=document.getElementById("main"),q=vQ;if(!q){el.innerHTML="";return}let h="";if(q.type==="mc"){const ok=vAns&&vUA===q.ci,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;if(q.askT)h+=`<div class="q-txt">Define: <b>${q.c.t}</b></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.d}</span></button>`}).join("")}</div>`;else h+=`<div class="q-txt">Which term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div><div class="opts">${q.opts.map((o,i)=>{let c="opt";if(vAns){c+=" done";if(i===q.ci)c+=" c-ok";else if(i===vUA)c+=" c-no"}return`<button class="${c}" onclick="chkVM(${i})"><span class="opt-ltr">${vAns&&i===q.ci?"✓":vAns&&i===vUA?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`}).join("")}</div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else if(q.type==="tf"){const ok=vAns&&vUA===q.isT,cc=vAns?(ok?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(ok?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div><div class="q-txt"><b>${q.t}</b> — <span style="color:var(--cyn);font-style:italic">"${q.sd}"</span></div><div class="opts" style="flex-direction:row;gap:8px;margin-top:10px">`;["True","False"].forEach(l=>{const v=l==="True";let c="opt";if(vAns){c+=" done";if(v===q.isT)c+=" c-ok";else if(v===vUA)c+=" c-no"}h+=`<button class="${c}" style="flex:1;justify-content:center" onclick="chkVT(${v})">${l}</button>`});h+=`</div>`;if(vAns&&!ok)h+=`<div class="sol" style="margin-top:12px"><div class="sol-tag">Correct</div><div class="stp">${q.cd}</div></div>`;if(vAns)h+=`<div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`;h+=`</div>`}else{const cc=vAns?(vUA?"ok":"no"):"";h+=`<div class="pc ${cc}"><div class="pc-top"><span class="bg ${vAns?(vUA?"bg-ok":"bg-no"):"bg-q"}">Vocab</span></div>`;h+=q.askT?`<div class="q-txt">Define: <b>${q.c.t}</b></div>`:`<div class="q-txt">What term?<br><br><span style="color:var(--cyn);font-style:italic">"${q.c.d}"</span></div>`;if(!vAns)h+=`<div style="margin-top:12px"><textarea class="v-ta" id="vi" placeholder="${q.askT?"Type definition…":"Type the term…"}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chkVW()}"></textarea></div><div class="btn-row"><button class="ab" onclick="chkVW()">Check</button></div>`;else{h+=`<div class="fb ${vUA?"fb-ok":"fb-no"}" style="margin-top:8px">${vUA?"✓ Matched!":"✗ Review below"}</div><div class="sol" style="margin-top:10px"><div class="sol-tag">Answer</div>`;h+=q.askT?`<div class="stp">${q.c.d}</div>`:`<div class="stp" style="font-size:14px;font-weight:600">${q.c.t}</div>`;h+=`</div><div class="btn-row" style="margin-top:10px"><button class="btn-nx" onclick="genV()">Next →</button></div>`}h+=`</div>`}el.innerHTML=h}

// ========== LEARNING MODE ==========
function startL(t){lTopic=t;lIdx=0;lCPA=false;lCPU=null;lCPH=false;qzMode=false;qzIdx=0;qzS=0;qzA=false;qzU=null;renderL()}
function exitL(){lTopic=null;qzMode=false;renderL()}
function nextC(){lIdx++;lCPA=false;lCPU=null;lCPH=false;if(lIdx>=LESSONS[lTopic].cards.length){qzMode=true;qzIdx=0;qzS=0;qzA=false;qzU=null}renderL()}
function prevC(){if(lIdx>0){lIdx--;lCPA=false;lCPU=null;lCPH=false}renderL()}
function chkCP(i){const c=LESSONS[lTopic].cards[lIdx];if(lCPA)return;lCPU=i;if(c.opts[i].ok){lCPA=true;lCPH=false;nA++;nC++;streak++}else{lCPH=true;nA++;streak=0}updS();renderL()}

function chkQz(i){if(qzA)return;qzA=true;qzU=i;nA++;const q=LESSONS[lTopic].quiz[qzIdx];if(q.opts[i].ok){qzS++;nC++;streak++}else streak=0;updS();renderL()}
function nextQz(){qzIdx++;qzA=false;qzU=null;renderL()}
function renderL(){const el=document.getElementById("main");if(!lTopic){el.innerHTML=`<div style="text-align:center;padding:40px 24px"><div style="font-size:44px;margin-bottom:12px">🎓</div><div style="font:400 24px/1.3 var(--s);margin-bottom:8px">Welcome to Learning Mode</div><div style="font:400 14px/1.6 var(--f);color:var(--mut);margin-bottom:20px;max-width:400px;margin-left:auto;margin-right:auto">Guided walkthrough of Module 1 with checkpoints and an end-of-lesson quiz. Pick a topic to start!</div><div class="topic-picker">${Object.entries(LESSONS).map(([k,l])=>`<button class="topic-btn" onclick="startL('${k}')"><span style="font-size:24px;display:block;margin-bottom:6px">${l.icon}</span><b>${l.title}</b><div class="topic-sub">${l.cards.length} cards + ${l.quiz.length}-Q quiz</div></button>`).join("")}</div></div>`;return}if(qzMode){const quiz=LESSONS[lTopic].quiz;if(qzIdx>=quiz.length){const pct=Math.round(qzS/quiz.length*100);el.innerHTML=`<div class="lesson-wrap"><div class="lesson-card" style="text-align:center"><div style="font:700 10px var(--m);letter-spacing:.15em;color:var(--acc);text-transform:uppercase">Complete</div><div class="quiz-score ${pct>=70?"qok":""}">${qzS}/${quiz.length}</div><div style="font:400 14px var(--f);color:var(--mut)">${pct}% · ${pct>=70?"Great! 🎉":"Keep studying 💪"}</div><div class="btn-row" style="justify-content:center;margin-top:20px"><button class="nav-btn" onclick="startL(lTopic)">🔁 Restart</button><button class="nav-btn primary" onclick="exitL()">← Topics</button></div></div></div>`;return}const q=quiz[qzIdx],prog=((qzIdx+(qzA?1:0))/quiz.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div><div class="lesson-prog">Quiz · ${qzIdx+1}/${quiz.length}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div></div><div class="lesson-card"><div class="lesson-type">🎯 Quiz</div><div class="lesson-cp-q">${q.q}</div><div class="opts">`;q.opts.forEach((o,i)=>{let c="opt";if(qzA){c+=" done";if(o.ok)c+=" c-ok";else if(i===qzU)c+=" c-no"}h+=`<button class="${c}" onclick="chkQz(${i})"><span class="opt-ltr">${qzA&&o.ok?"✓":qzA&&i===qzU?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(qzA){h+=`<div class="fb ${q.opts[qzU].ok?"fb-ok":"fb-no"}" style="margin-top:10px">${q.opts[qzU].ok?"✓ Correct!":"✗ See above"}</div>`;if(q.expl)h+=`<div class="sol" style="margin-top:10px"><div class="sol-tag">Why</div><div class="stp">${q.expl}</div></div>`;h+=`<div class="btn-row" style="margin-top:12px;justify-content:flex-end"><button class="nav-btn primary" onclick="nextQz()">${qzIdx+1>=quiz.length?"Results →":"Next →"}</button></div>`}h+=`</div></div>`;el.innerHTML=h;return}const lesson=LESSONS[lTopic],card=lesson.cards[lIdx],prog=((lIdx+1)/lesson.cards.length)*100;let h=`<div class="lesson-wrap"><div class="lesson-nav"><button class="nav-btn" onclick="exitL()">← Exit</button><div style="text-align:center"><div class="lesson-prog">${lesson.icon} ${lesson.title}</div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div><div style="min-width:50px;text-align:right"><span class="lesson-prog">${lIdx+1}/${lesson.cards.length}</span></div></div><div class="lesson-card">`;if(card.type==="teach")h+=`<div class="lesson-type">📖 Lesson</div><div style="font:400 20px/1.3 var(--s);color:var(--txt);margin-bottom:14px">${card.title}</div><div class="lesson-body">${card.body}</div>`;else if(card.type==="definition")h+=`<div class="lesson-type">📚 Definition</div><div class="lesson-def"><div class="lesson-def-t">${card.term}</div><div class="lesson-def-b">${card.def}</div></div>${card.extra?`<div class="lesson-body">${card.extra}</div>`:""}`;else if(card.type==="equation")h+=`<div class="lesson-type">🔢 Key Equation</div><div style="font:400 18px/1.3 var(--s);color:var(--txt);margin-bottom:10px">${card.title}</div><div class="lesson-eq">${card.eq}</div>${card.note?`<div class="lesson-body">${card.note}</div>`:""}`;else if(card.type==="checkpoint"){h+=`<div class="lesson-checkpoint"><div class="lesson-cp-t">✓ Checkpoint</div><div class="lesson-cp-q">${card.q}</div><div class="opts">`;card.opts.forEach((o,i)=>{let c="opt";if(lCPA&&o.ok)c+=" done c-ok";else if(lCPU===i&&!o.ok&&lCPH)c+=" c-no";else if(lCPA)c+=" done";h+=`<button class="${c}" onclick="chkCP(${i})"><span class="opt-ltr">${lCPA&&o.ok?"✓":lCPU===i&&!o.ok&&lCPH?"✗":String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`});h+=`</div>`;if(lCPH&&!lCPA)h+=`<div class="hint-box"><div style="font:700 9px var(--m);letter-spacing:.12em;color:var(--ylw);text-transform:uppercase;margin-bottom:4px">💡 Hint</div>${card.hint}</div><div class="btn-row"><button class="nav-btn" onclick="retryCP()">Try Again</button></div>`;if(lCPA)h+=`<div class="fb fb-ok" style="margin-top:12px">✓ Nice!</div>${card.expl?`<div class="sol" style="margin-top:8px"><div class="sol-tag">Why</div><div class="stp">${card.expl}</div></div>`:""}`;h+=`</div>`}h+=`<div class="btn-row" style="justify-content:space-between;margin-top:20px"><button class="nav-btn" onclick="prevC()" ${lIdx===0?"disabled":""}>← Prev</button>`;if(card.type==="checkpoint"&&!lCPA)h+=`<span style="font:400 11px var(--f);color:var(--dim)">Answer to continue</span>`;else h+=`<button class="nav-btn primary" onclick="nextC()">${lIdx+1>=lesson.cards.length?"Start Quiz →":"Continue →"}</button>`;h+=`</div></div></div>`;el.innerHTML=h}

// ========== CHEATSHEET ==========
function renderCS(){renderCtrls();let h=`<div class="cs-sec">⚡ All Module 1 Formulas & Worked Examples</div>`;CS.forEach(c=>{h+=`<div class="cs-card"><div class="cs-title">${c.title}</div><div class="cs-fm">${c.fm.join("<br>")}</div><div class="cs-lb">Key Points</div><div class="cs-vr">${c.vr.replace(/\n/g,"<br>")}</div><div class="cs-lb">Example</div><div class="cs-ex"><div style="font:400 12px/1.5 var(--f);color:var(--mut);margin-bottom:4px">${c.ex.q}</div>${c.ex.st.map(s=>`<div class="stp">${s}</div>`).join("")}</div></div>`});h+=`<div class="cs-sec">📖 All ${VOCAB.length} Vocabulary Terms</div>`;VOCAB.forEach((v,i)=>{h+=`<div class="cs-card" style="padding:10px 12px;margin-bottom:5px"><span style="font:700 10px var(--m);color:var(--acc);margin-right:6px">${i+1}.</span><b>${v.t}</b><span style="margin:0 6px;color:var(--dim)">—</span><span style="color:var(--mut);font-size:12px">${v.d}</span></div>`});document.getElementById("main").innerHTML=h}

renderModes();renderCtrls();genP();genV();updS();
</script>
</body>
</html>
